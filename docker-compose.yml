services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ticketprime-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "TechSonicInc@2026"
    ports:
      - "1433:1433"
    volumes:
      - ticketprime_sql_data:/var/opt/mssql

volumes:
  ticketprime_sql_data: